name: MultiViewDetector
source: custom
module: models.multi_view_detector
class: MultiViewDetector
config_class: MultiViewDetectorConfig
params:
  num_feature: 1
  num_embedding: 64
  num_hidden: 128
  num_head: 4
  num_layers: 3
  dropout: 0.2

  feature: 'latent'   # 'latent' or 'hidden'
  loss_type: 'ALL'    # 'ALL', 'TDF', 'TD', 'TF', 'DF', 'T', 'D', 'F'
  projection_dim: 128

  batch_size: 128
  num_epochs: 200
  patience: 20
  lr: 0.001
  weight_decay: 0.00001
  l1_scale: 0.0
  l2_scale: 0.01
  temperature: 0.07
  augmentation_strength: 0.1
  threshold_quantile: 0.99

  use_gpu: true
  checkpoint_path: null

  max_score: 1.0
  enable_calibrator: true
  enable_threshold: true
