name: MultiViewClassifier
source: custom
module: models.multi_view_classifier
class: MultiViewClassifier
config_class: MultiViewClassifierConfig
mlflow:
  # Required named groups: epoch and one or more numeric metric groups.
  epoch_log_pattern: '^Epoch\s+(?P<epoch>\d+):\s+Train Loss:\s+(?P<train_loss>[0-9]*\.?[0-9]+),\s+Val Loss:\s+(?P<val_loss>[0-9]*\.?[0-9]+)(?:,\s+Val Acc:\s+(?P<val_acc>[0-9]*\.?[0-9]+))?$'
params:
  num_feature: 1
  num_embedding: 64
  num_hidden: 128
  num_head: 4
  num_layers: 3
  num_target: 4
  dropout: 0.2
  
  # Training
  batch_size: 128
  num_epochs: 200
  patience: 20
  lr: 0.001
  weight_decay: 0.00001
  l1_scale: 0.0
  l2_scale: 0.01
  
  # Loss
  loss_type: 'ALL'  # 'ALL', 'TDF', 'TD', 'TF', 'DF', 'T', 'D', 'F'
  feature: 'hidden'  # 'latent' or 'hidden'
  temperature: 0.07
  lam: 0.0
  
  # Mode
  mode: 'pretrain'  # 'pretrain', 'finetune', 'freeze'
  pretrain_validate_on_train: true
  finetune_monitor_metric: 'accuracy'
  use_gpu: true
  checkpoint_path: null
  
  # DetectorConfig params
  max_score: 1.0
  enable_calibrator: true
  enable_threshold: true
