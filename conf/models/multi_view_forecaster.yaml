name: MultiViewForecaster
source: custom
module: models.multi_view_forecaster
class: MultiViewForecaster
config_class: MultiViewForecasterConfig
mlflow:
  # Required named groups: epoch and one or more numeric metric groups.
  epoch_log_pattern: '^Epoch\s+(?P<epoch>\d+):\s+train_loss=(?P<train_loss>[0-9]*\.?[0-9]+),\s+train_loss_c=(?P<train_loss_c>[0-9]*\.?[0-9]+),\s+val_loss=(?P<val_loss>[0-9]*\.?[0-9]+)$'
params:
  num_feature: 1
  num_embedding: 64
  num_hidden: 128
  num_head: 4
  num_layers: 3
  dropout: 0.2

  feature: 'latent'   # 'latent' or 'hidden'
  loss_type: 'ALL'    # 'ALL', 'TDF', 'TD', 'TF', 'DF', 'T', 'D', 'F'

  window_size: 48
  forecast_horizon: 24
  target_seq_index: 0

  batch_size: 128
  num_epochs: 200
  patience: 20
  lr: 0.001
  weight_decay: 0.00001
  l1_scale: 0.0
  l2_scale: 0.01
  temperature: 0.5
  lam: 0.1
  mode: 'finetune'  # 'pretrain', 'finetune', 'freeze'
  pretrain_validate_on_train: false
  finetune_monitor_metric: 'loss'
  augmentation_strength: 0.1
  train_stride: 1
  max_train_windows: null
  samplewise_windows_per_sample: 1
  samplewise_train_sampling: 'random'
  samplewise_eval_sampling: 'center'
  samplewise_stride: 1

  use_gpu: true
  checkpoint_path: null

  max_forecast_steps: null
