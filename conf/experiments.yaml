  # ==========================================================================
  # RawForecaster comparisons for runs 19/20 (univariate) and 21/22 (multivariate)
  # Each group has three conditions:
  #   A) Train on ETTm1, finetune on ETTm2  (transfer, comparable to 20 / 22)
  #   B) Train from scratch on ETTm2        (no-transfer baseline)
  #   C) Train on ETTm1, skip training on ETTm2 (zero-shot transfer)
  # ==========================================================================

  # --- Univariate (OT only) ---

    - id: 26
      name: "ETTm1_RawForecaster_Univariate_Train"
      task: "forecasting"
      data: "ettm1"
      model: "raw_forecaster"
      preprocessor: "no_preproc"
      metrics: ["rmse", "smape", "mae"]
      overrides:
        data:
          target_columns: ["OT"]
        model:
          params:
            num_feature: 1
            num_epochs: 200
            num_out_features: 1
            window_size: 96
            forecast_horizon: 96
            train_stride: 48

    - id: 27
      name: "ETTm2_RawForecaster_Univariate_Finetune"
      task: "forecasting"
      data: "ettm2"
      model: "raw_forecaster"
      preprocessor: "no_preproc"
      metrics: ["rmse", "smape", "mae"]
      pretrained_run: 26
      overrides:
        data:
          target_columns: ["OT"]
        model:
          params:
            num_feature: 1
            num_epochs: 100
            num_out_features: 1
            window_size: 96
            forecast_horizon: 96
            train_stride: 48

    - id: 28
